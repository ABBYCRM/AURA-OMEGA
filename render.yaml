services:
  - type: web
    name: aura-omega
    runtime: node
    plan: free
    region: oregon
    branch: main
    # Build source on Render so Discord bridge source changes cannot be missed by a stale dist bundle.
    buildCommand: ./render-build.sh
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BASE_PATH
        value: /
      # ⚠️ CRITICAL — SESSION_SECRET is the key that decrypts the in-app vault
      #    (AES-256-GCM). If this value EVER changes, every stored secret becomes
      #    PERMANENTLY unreadable. `generateValue: true` sets it once and keeps it
      #    across deploys — do NOT regenerate it, edit it, or recreate the service
      #    without first copying the current value. Keep an off-site copy of it,
      #    and back up the vault: `pnpm --filter @workspace/scripts vault:backup`.
      - key: SESSION_SECRET
        generateValue: true
      - key: OPERATOR_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: aura-omega-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: STEEL_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: NEUROBUDDY_API_KEY
        sync: false
      # Discord bridge: UI -> API -> Discord -> existing Claw/AURA-OMEGA -> Discord -> UI
      - key: DISCORD_BRIDGE_ENABLED
        value: "true"
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      - key: DISCORD_AURA_BOT_USER_IDS
        sync: false
      - key: DISCORD_REPLY_WAIT_MS
        value: "90000"
      - key: DISCORD_REPLY_POLL_MS
        value: "2000"
      # Buddy AI fallback LLM
      - key: BUDDY_API_KEY
        sync: false
      - key: BUDDY_BASE_URL
        sync: false
      - key: BUDDY_MODEL
        value: bos-omega
      # Composio tool/auth router (execution off by default)
      - key: COMPOSIO_API_KEY
        sync: false
      - key: COMPOSIO_BASE_URL
        value: https://backend.composio.dev/api/v3.1
      - key: ALLOW_COMPOSIO_EXECUTE
        value: "false"
      # ── Additional integrations (all optional; set the ones you use) ──
      # Observability
      - key: HELICONE_API_KEY
        sync: false
      - key: LANGSMITH_API_KEY
        sync: false
      # Alias accepted by the tracing layer (LANGSMITH_API_KEY takes precedence)
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGSMITH_PROJECT
        value: aura-omega-ui-omega
      # Web search providers
      - key: TAVILY_API_KEY
        sync: false
      - key: EXA_API_KEY
        sync: false
      # Semantic memory (real vector RAG). EMBEDDINGS_API_KEY makes the vectors;
      # required for BOTH the Postgres store and Pinecone.
      - key: EMBEDDINGS_API_KEY
        sync: false
      - key: EMBEDDINGS_BASE_URL
        value: https://api.openai.com/v1
      - key: EMBEDDINGS_MODEL
        value: text-embedding-3-small
      # Pinecone = primary vector store (falls back to Postgres if unset/unreachable).
      # The index dimension MUST match the embedding model (1536 for the default).
      # Provide EITHER PINECONE_INDEX (the index name — host auto-resolved via the
      # Pinecone API) OR the full PINECONE_INDEX_HOST. PINECONE_INDEX is simplest.
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        sync: false
      - key: PINECONE_INDEX_HOST
        sync: false
      - key: PINECONE_NAMESPACE
        value: aura-omega-ui
      # Event bus + cloud sandbox
      - key: INNGEST_EVENT_KEY
        sync: false
      - key: INNGEST_SIGNING_KEY
        sync: false
      - key: INNGEST_EVENT_URL
        sync: false
      - key: E2B_API_KEY
        sync: false
      # GitHub token for the sandbox git tools (agents push branches / open PRs).
      # Use a FINE-GRAINED token scoped to this repo only (Contents + PRs write).
      # Value is set in the Render dashboard or the in-app vault — never committed.
      - key: SANDBOX_GITHUB_TOKEN
        sync: false

# ⚠️ Keep `plan` IN SYNC with the Render dashboard. A blueprint re-sync applies
#    the value below, so if it says `free` while the dashboard is on a paid plan,
#    a sync could try to downgrade — and Render DELETES free Postgres after ~30
#    days. Set this to your actual paid plan slug. Back up regardless:
#    `pnpm --filter @workspace/scripts vault:backup` (encrypted, off-database).
databases:
  - name: aura-omega-db
    plan: free   # TODO: set to the paid plan slug shown in the Render dashboard
    region: oregon
    databaseName: aura-omega-ui_db_te42
    user: aura-omega-ui_db_te42_user
