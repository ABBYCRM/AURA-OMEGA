name: Build & Deploy to Render

# Dist is always pre-built and committed before push.
# Render buildCommand = "echo dist is prebuilt" — no build needed here.
# This job only pings the Render deploy API to trigger a fast redeploy.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.agents/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -o /dev/null -w "Render deploy: HTTP %{http_code}\n" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/srv-d8hmeunlk1mc73faoh90/deploys" \
            -d '{"clearCache": "do_not_clear"}'
